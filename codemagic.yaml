workflows:
  android-debug-workflow:
    name: Build Debug APK (Pronto para Instalar)
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Configurar Permissões e Keystore
        script: |
          chmod +x gradlew || true
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore 2>/dev/null || base64 --decode debug.keystore.base64 > debug.keystore 2>/dev/null || true
          fi
      - name: Compilar APK Debug
        script: |
          gradle :app:assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk

  android-release-workflow:
    name: Build Release (APK e AAB)
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Configurar Permissões e Keystore
        script: |
          chmod +x gradlew || true
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore 2>/dev/null || base64 --decode debug.keystore.base64 > debug.keystore 2>/dev/null || true
          fi
      - name: Compilar APK & App Bundle
        script: |
          gradle :app:assembleRelease || gradle :app:assembleDebug
    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
